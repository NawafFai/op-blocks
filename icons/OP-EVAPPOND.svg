<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- OP-EVAPPOND — Solar Evaporation Pond. ONE PROCESS filled flat-vector
       style: body #BFE3F5, accent #29ABE2, outline #1B3A5C (2.4px),
       rounded joins, white highlights. Sun + vapour wisps + pond basin. -->

  <!-- sun -->
  <g stroke="#1B3A5C" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
    <circle cx="14" cy="14" r="6" fill="#29ABE2"/>
    <g fill="none">
      <path d="M14 3.5 v3"/>
      <path d="M14 21.5 v3"/>
      <path d="M3.5 14 h3"/>
      <path d="M21.5 14 h3"/>
      <path d="M6.6 6.6 l2.1 2.1"/>
      <path d="M19.3 8.7 l2.1 -2.1"/>
    </g>
  </g>

  <!-- vapour wisps rising from the surface -->
  <g stroke="#1B3A5C" stroke-width="2.4" fill="none" stroke-linecap="round">
    <path d="M36 18 c2.5 3 -2.5 5 0 8"/>
    <path d="M45 16 c2.5 3 -2.5 5 0 8"/>
    <path d="M53 18 c2.5 3 -2.5 5 0 8"/>
  </g>

  <!-- pond basin (trapezoid) filled with brine -->
  <g stroke="#1B3A5C" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
    <path d="M6 34 H58 L51 52 a4 4 0 0 1 -3.8 2.8 H16.8 A4 4 0 0 1 13 52 Z" fill="#BFE3F5"/>
    <!-- cyan water-surface band -->
    <path d="M6 34 H58 L55.5 40.5 H8.5 Z" fill="#29ABE2"/>
    <!-- basin outline re-stroke -->
    <path d="M6 34 H58 L51 52 a4 4 0 0 1 -3.8 2.8 H16.8 A4 4 0 0 1 13 52 Z" fill="none"/>
  </g>

  <!-- salt crystals settling at the bottom -->
  <g fill="#FFFFFF" stroke="#1B3A5C" stroke-width="1.4" stroke-linejoin="round">
    <path d="M24 49 l2.2 -3.6 2.2 3.6 z"/>
    <path d="M33 49 l2.2 -3.6 2.2 3.6 z"/>
  </g>

  <!-- white highlight ticks on the surface band -->
  <g stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" fill="none">
    <path d="M14 37.2 h7"/>
    <path d="M26 37.2 h5"/>
  </g>
</svg>
